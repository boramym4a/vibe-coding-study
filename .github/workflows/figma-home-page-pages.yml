name: Deploy Figma Home Page

on:
  push:
    branches: [main]
    paths:
      - 'figma-home-page/**'
      - '.github/workflows/figma-home-page-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: figma-home-page-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: figma-home-page
      - id: deployment
        uses: actions/deploy-pages@v4
